global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']


  - job_name: 'bot_producer_metrics'
    static_configs:
      - targets: ['bot_producer:9092']


  - job_name: 'bot_consumer_metrics'
    static_configs:
      - targets: ['bot_consumer:9091']